repos:
  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy
        entry: bash -c 'cd backend && go mod tidy -diff'
        language: system
        pass_filenames: false

      - id: go-fmt
        name: go fmt
        entry: bash -c 'cd backend && UNFORMATTED="$(gofmt -l .)"; if [ -n "$UNFORMATTED" ]; then echo "These files need gofmt:"; echo "$UNFORMATTED"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: go-vet
        name: go vet
        entry: bash -c 'cd backend && go vet ./...'
        language: system
        pass_filenames: false

      - id: go-test
        name: go test
        entry: bash -c 'cd backend && go test ./...'
        language: system
        pass_filenames: false

      - id: go-build
        name: go build
        entry: bash -c 'cd backend && go build ./...'
        language: system
        pass_filenames: false
